name: Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: read

jobs:
  publish:
    name: Pack, publish, and release
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    env:
      DOTNET_NOLOGO: true
      NUGET_SOURCE: https://api.nuget.org/v3/index.json
      PACKAGE_PROJECT: NastMz.CleanArchitecture.Templates.csproj
      PACKAGE_OUTPUT: artifacts/packages
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.x

      - name: Resolve package version from tag
        id: version
        shell: bash
        run: |
          TAG="${GITHUB_REF_NAME}"
          VERSION="${TAG#v}"

          if [[ ! "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+([-.][0-9A-Za-z.-]+)?$ ]]; then
            echo "Tag '$TAG' does not resolve to a valid NuGet package version." >&2
            echo "Use tags like v1.0.0 or v1.0.0-preview.1." >&2
            exit 1
          fi

          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Restore template pack project
        run: dotnet restore "$PACKAGE_PROJECT"

      - name: Pack template pack
        run: >-
          dotnet pack "$PACKAGE_PROJECT"
          --configuration Release
          --no-restore
          --output "$PACKAGE_OUTPUT"
          -p:PackageVersion=${{ steps.version.outputs.version }}
          -p:Version=${{ steps.version.outputs.version }}

      - name: NuGet login using trusted publishing
        id: nuget-login
        uses: NuGet/login@v1
        with:
          user: ${{ secrets.NUGET_USER }}

      - name: Publish package to NuGet
        run: >-
          dotnet nuget push "$PACKAGE_OUTPUT/*.nupkg"
          --api-key "${{ steps.nuget-login.outputs.NUGET_API_KEY }}"
          --source "$NUGET_SOURCE"
          --skip-duplicate

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: >-
          gh release create "${{ steps.version.outputs.tag }}"
          "$PACKAGE_OUTPUT"/*.nupkg
          --verify-tag
          --generate-notes